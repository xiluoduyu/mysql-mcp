# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'

    - name: Build
      run: mkdir -p bin && go build -trimpath -tags=netgo -ldflags="-w -s" -o bin/mysql-mcp.linux.amd64 ./...

    - name: Test
      run: go test ./... -count=1
